<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Scanner - Hanan</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: #111826;
    border-bottom: 1px solid #1f2937;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111826;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #1f2937;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0b0f14;
    border: 1px solid #1f2937;
    color: white;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}

ul {
    padding-left: 20px;
}
</style>
</head>

<body>

<header>
<h1>Cyber Scanner</h1>
<p>Security Risk Intelligence Platform</p>
<small>Developed by Hanan</small>
</header>

<div class="container">

<div class="card">
<h2>Analyze Vulnerability</h2>
<input id="cvss" placeholder="Enter CVSS Score (0 - 10)">
<button onclick="analyze()">Analyze</button>
</div>

<div class="card" id="result">
<h2>Result</h2>
<p>No analysis yet</p>
</div>

<div class="card">
<h2>History</h2>
<ul id="history"></ul>
</div>

</div>

<script>
function getRisk(cvss) {
    let level, score, reason, fix, color;

    if (cvss >= 9) {
        level = "CRITICAL";
        score = 95;
        reason = "High exploitability and impact";
        fix = "Immediate patch and isolation required";
        color = "red";
    } 
    else if (cvss >= 7) {
        level = "HIGH";
        score = 80;
        reason = "High risk vulnerability";
        fix = "Fix within 24-72 hours";
        color = "orange";
    } 
    else if (cvss >= 4) {
        level = "MEDIUM";
        score = 55;
        reason = "Moderate risk, needs monitoring";
        fix = "Schedule update";
        color = "gold";
    } 
    else {
        level = "LOW";
        score = 20;
        reason = "Low risk";
        fix = "Monitor only";
        color = "green";
    }

    return { level, score, reason, fix, color };
}

function analyze() {
    let cvss = parseFloat(document.getElementById("cvss").value);
    let r = getRisk(cvss);

    document.getElementById("result").innerHTML =
        "<h2 style='color:" + r.color + "'>" + r.level + "</h2>" +
        "<p><b>Score:</b> " + r.score + "/100</p>" +
        "<p><b>Reason:</b> " + r.reason + "</p>" +
        "<p><b>Fix:</b> " + r.fix + "</p>" +
        "<small>Developed by Hanan</small>";

    let li = document.createElement("li");
    li.textContent = "CVSS " + cvss + " → " + r.level;
    document.getElementById("history").appendChild(li);
}
</script>

</body>
</html>
