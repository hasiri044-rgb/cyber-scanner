<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hanan SOC Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f172a;
    color: #e5e7eb;
}

.center {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
}

input, select, button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 6px;
}

input, select {
    background: #0f172a;
    border: 1px solid #334155;
    color: #e5e7eb;
}

button {
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
}

#app { display: none; }

header {
    text-align: center;
    padding: 15px;
    background: #1e293b;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
}

.delete-btn {
    background: #334155;
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
}

.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: 10px;
}

.CRITICAL { background: #dc2626; }
.HIGH { background: #f97316; }
.MEDIUM { background: #facc15; color: black; }
.LOW { background: #22c55e; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
<div class="box">
<h2>Enter Dashboard</h2>
<input id="user" placeholder="Your name">
<button onclick="enter()">Continue</button>
</div>
</div>

<!-- APP -->
<div id="app">

<header>
<h2>Hanan SOC Dashboard</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Add Vulnerability</h3>
<input id="cvss" placeholder="CVSS (0-10)">
<button onclick="addVuln()">Add</button>
</div>

<div class="card">
<h3>User Info</h3>
<p id="who"></p>
<p id="stats"></p>
</div>

<div class="card">
<h3>
Vulnerabilities
<button onclick="clearData()" class="delete-btn">Clear</button>
</h3>

<input id="search" placeholder="Search..." oninput="update()">

<select id="filter" onchange="update()">
<option value="ALL">All</option>
<option value="CRITICAL">Critical</option>
<option value="HIGH">High</option>
<option value="MEDIUM">Medium</option>
<option value="LOW">Low</option>
</select>

<ul id="list"></ul>
</div>

<div class="card">
<h3>Risk Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Smart Analysis</h3>
<p id="analysis"></p>
</div>

</div>
</div>

<script>

let data = [];
let chart;

// LOGIN
function enter() {
let name = document.getElementById("user").value;
if(!name) return alert("Enter name");

sessionStorage.setItem("user", name);
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("who").innerText = "User: " + name;

update();
}

function logout() {
sessionStorage.clear();
location.reload();
}

function check() {
let user = sessionStorage.getItem("user");
if(user){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("who").innerText = "User: " + user;
update();
}
}

// ADD
function addVuln() {
let cvss = parseFloat(document.getElementById("cvss").value);
if(isNaN(cvss) || cvss<0 || cvss>10) return alert("0-10 only");

let level = classify(cvss);

data.push({
cvss,
level,
time: new Date().toLocaleTimeString()
});

update();
}

// CLASSIFY
function classify(cvss){
if(cvss>=9) return "CRITICAL";
if(cvss>=7) return "HIGH";
if(cvss>=4) return "MEDIUM";
return "LOW";
}

// CLEAR
function clearData(){
data = [];
update();
}

// UPDATE
function update(){

let list = document.getElementById("list");
list.innerHTML="";

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let count = {CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0};

data.forEach(v=>{

if(filter!=="ALL" && v.level!==filter) return;
if(!v.cvss.toString().includes(search)) return;

count[v.level]++;

let li = document.createElement("li");
li.innerHTML = `[${v.time}] CVSS ${v.cvss}
<span class="badge ${v.level}">${v.level}</span>`;
list.appendChild(li);

});

document.getElementById("stats").innerText = "Total: "+list.children.length;

draw(count);
analyze(count);
}

// CHART
function draw(c){
const canvas = document.getElementById("chart");

if(chart) chart.destroy();

chart = new Chart(canvas,{
type:"pie",
data:{
labels:["Critical","High","Medium","Low"],
datasets:[{
data:[c.CRITICAL,c.HIGH,c.MEDIUM,c.LOW],
backgroundColor:["#dc2626","#f97316","#facc15","#22c55e"]
}]
}
});
}

// AI ANALYSIS
function analyze(c){

let total = c.CRITICAL + c.HIGH + c.MEDIUM + c.LOW;
let text="";

if(total===0){
text="No data yet.";
}
else if(c.CRITICAL>0){
text="🚨 High Risk: Critical vulnerabilities detected. Fix immediately.";
}
else if(c.HIGH>2){
text="⚠️ Elevated Risk: Multiple high vulnerabilities.";
}
else if(c.MEDIUM>3){
text="Moderate Risk: Needs review.";
}
else{
text="✅ System stable.";
}

document.getElementById("analysis").innerText = text;
}

// INIT
check();

</script>

</body>
</html>
