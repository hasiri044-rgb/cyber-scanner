<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hanan SOC Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f172a;
    color: #e5e7eb;
}

/* LOGIN */
.center {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

input {
    background: #0f172a;
    border: 1px solid #334155;
    color: #e5e7eb;
}

button {
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* APP */
#app {
    display: none;
}

<header style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#1e293b;">

<div>
<h2>Hanan SOC Dashboard</h2>
<small>Cyber Security Monitoring</small>
</div>

<div>
<button onclick="logout()" style="background:#ef4444; padding:6px 10px; border:none; border-radius:6px; color:white; cursor:pointer;">
Logout
</button>

<button onclick="clearData()" style="
background:#f9a8d4;
border:none;
width:28px;
height:28px;
border-radius:50%;
margin-left:8px;
cursor:pointer;
font-size:14px;">
💖
</button>

</div>

</header>
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #334155;
}

/* BADGES */
.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: 10px;
}

.CRITICAL { background: #dc2626; }
.HIGH { background: #f97316; }
.MEDIUM { background: #facc15; color: black; }
.LOW { background: #22c55e; }

li {
    margin-top: 8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
    <div class="box">
        <h2>Enter Dashboard</h2>
        <input id="user" placeholder="Your name">
        <button onclick="enter()">Continue</button>
    </div>
</div>

<!-- APP -->
<div id="app">

<header>
<h2>Hanan SOC Dashboard</h2>
<small>Cyber Security Monitoring</small><br>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Add Vulnerability</h3>
<input id="cvss" placeholder="Enter CVSS (0 - 10)">
<button onclick="addVuln()">Add</button>
</div>

<div class="card">
<h3>User Info</h3>
<p id="who"></p>
<p id="stats"></p>
</div>

<div class="card">
<h3>Vulnerabilities</h3>
<ul id="list"></ul>
</div>

<div class="card">
<h3>Risk Chart</h3>
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("soc")) || [];
let chart;

// LOGIN
function enter() {
    let name = document.getElementById("user").value;

    if(name.trim() === "") {
        alert("Enter your name");
        return;
    }

    sessionStorage.setItem("user", name);

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("who").innerText = "User: " + name;

    update();
}

// LOGOUT
function logout() {
    sessionStorage.removeItem("user");
    location.reload();
}

// SESSION CHECK
function check() {
    let user = sessionStorage.getItem("user");

    if(user) {
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("who").innerText = "User: " + user;
        update();
    }
}
function clearData() {
    data = [];
    update();
}
// CLASSIFY
function classify(cvss) {
    if(cvss >= 9) return "CRITICAL";
    if(cvss >= 7) return "HIGH";
    if(cvss >= 4) return "MEDIUM";
    return "LOW";
}

// ADD
function addVuln() {

    let cvss = parseFloat(document.getElementById("cvss").value);

    if(isNaN(cvss) || cvss < 0 || cvss > 10) {
        alert("Enter valid CVSS (0-10)");
        return;
    }

    let level = classify(cvss);

    data.push({
        cvss,
        level,
        time: new Date().toLocaleTimeString()
    });

    localStorage.setItem("soc", JSON.stringify(data));

    update();
}

// UPDATE
function update() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    let count = {CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0};

    data.forEach(v => {

        count[v.level]++;

        let li = document.createElement("li");
        li.innerHTML = `
            [${v.time}] CVSS ${v.cvss}
            <span class="badge ${v.level}">${v.level}</span>
        `;
        list.appendChild(li);
    });

    document.getElementById("stats").innerText =
        "Total: " + data.length;

    draw(count);
}

// CHART
function draw(c) {

    const canvas = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(canvas, {
        type: "pie",
        data: {
            labels: ["Critical", "High", "Medium", "Low"],
            datasets: [{
                data: [
                    c.CRITICAL,
                    c.HIGH,
                    c.MEDIUM,
                    c.LOW
                ],
                backgroundColor: ["#dc2626","#f97316","#facc15","#22c55e"]
            }]
        }
    });
}

// INIT
check();

</script>

</body>
</html>
