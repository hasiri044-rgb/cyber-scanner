<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Risk Analysis Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0a0f1f;
  color: #ffffff;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  margin-top: 30px;
}

select, button {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00c2ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.card {
  margin-top: 20px;
  background: #1c2438;
  padding: 20px;
  border-radius: 12px;
  width: 60%;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  box-shadow: 0 0 10px #000;
}

.high { color: #ff4d4d; font-weight: bold; }
.medium { color: #ffb84d; font-weight: bold; }
.low { color: #4dff88; font-weight: bold; }

.label {
  color: #aaa;
}
</style>
</head>

<body>

<h1>🔐 Cybersecurity Risk Analysis System</h1>

<div class="container">

<select id="vulnType">
  <option value="XSS">Cross-Site Scripting (XSS)</option>
  <option value="SQLi">SQL Injection</option>
  <option value="Weak">Weak Password Policy</option>
</select>

<button onclick="analyze()">Analyze Vulnerability</button>

<div id="result" class="card"></div>

</div>

<script>
function analyze() {
  let type = document.getElementById("vulnType").value;

  let score = 0;
  let risk = "";
  let description = "";
  let recommendation = "";

  if (type === "XSS") {
    score = 6.5;
    risk = "MEDIUM";
    description = "This vulnerability allows attackers to inject malicious scripts into web pages viewed by users.";
    recommendation = "Implement input sanitization and enforce Content Security Policy (CSP).";
  }

  if (type === "SQLi") {
    score = 9.0;
    risk = "HIGH";
    description = "This vulnerability allows attackers to manipulate database queries and access sensitive data.";
    recommendation = "Use prepared statements and parameterized queries. Avoid direct user input in SQL queries.";
  }

  if (type === "Weak") {
    score = 5.0;
    risk = "MEDIUM";
    description = "Weak authentication mechanisms may allow unauthorized access to systems.";
    recommendation = "Enforce strong password policies and enable Multi-Factor Authentication (MFA).";
  }

  document.getElementById("result").innerHTML = `
    <h2>Risk Level: <span class="${risk.toLowerCase()}">${risk}</span></h2>

    <p><span class="label">CVSS-like Score:</span> ${score}/10</p>

    <p><span class="label">Description:</span><br>${description}</p>

    <p><span class="label">Recommendation:</span><br>${recommendation}</p>
  `;
}
</script>

</body>
</html>
