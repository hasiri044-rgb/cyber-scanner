<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure SOC - Hanan</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.center {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:#111827;
    padding:25px;
    border-radius:12px;
    width:300px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
}

input {
    background:#0b0f14;
    border:1px solid #1f2937;
    color:white;
}

button {
    background:#2563eb;
    border:none;
    color:white;
    cursor:pointer;
}

#app {
    display:none;
    padding:20px;
}

header {
    text-align:center;
    padding:15px;
    background:#111827;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
    <div class="box">
        <h2>Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- APP -->
<div id="app">

<header>
<h2>Cyber SOC Dashboard</h2>
<small>Developed by Hanan</small>
<button onclick="logout()">Logout</button>
</header>

<div class="card">
<h3>Welcome <span id="who"></span></h3>
<p>Status: Logged In</p>
</div>

</div>

<script>

// USERS (هذا يعتبر قاعدة بيانات بسيطة)
const users = [
    {username:"hanan", password:"1234", role:"admin"},
    {username:"analyst", password:"1111", role:"user"}
];

// LOGIN
function login() {

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let found = users.find(x => x.username === u && x.password === p);

    if(found) {

        sessionStorage.setItem("user", JSON.stringify(found));

        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";

        document.getElementById("who").innerText = found.username;

    } else {
        alert("Invalid credentials");
    }
}

// CHECK SESSION (حقيقي داخل المتصفح)
function checkSession() {

    let user = sessionStorage.getItem("user");

    if(user) {
        user = JSON.parse(user);

        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";

        document.getElementById("who").innerText = user.username;
    }
}

// LOGOUT
function logout() {
    sessionStorage.removeItem("user");
    location.reload();
}

checkSession();

</script>

</body>
</html>
