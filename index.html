<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hanan SOC Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: "Segoe UI";
    background:#0f172a;
    color:#e5e7eb;
}

.container {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
}

input, select, button {
    width:100%;
    margin-top:8px;
    padding:8px;
    border-radius:6px;
    border:none;
}

button {
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.badge {
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
}

.CRITICAL { background:#dc2626; }
.HIGH { background:#f97316; }
.MEDIUM { background:#facc15; color:black; }
.LOW { background:#22c55e; }

.alert {
    background:#dc2626;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Add Vulnerability</h3>
<input id="cvss" placeholder="CVSS (0-10)">
<button onclick="addVuln()">Analyze</button>
<button onclick="simulateAttack()">Simulate Attack</button>
</div>

<div class="card">
<h3>Filter</h3>
<input id="search" placeholder="Search..." oninput="update()">
<select id="filter" onchange="update()">
<option value="ALL">All</option>
<option value="CRITICAL">Critical</option>
<option value="HIGH">High</option>
<option value="MEDIUM">Medium</option>
<option value="LOW">Low</option>
</select>
</div>

<div class="card">
<h3>Vulnerabilities</h3>
<button onclick="clearData()">Clear</button>
<ul id="list"></ul>
</div>

<div class="card">
<h3>Logs</h3>
<ul id="logs"></ul>
</div>

<div class="card">
<h3>Risk Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>AI Analysis</h3>
<p id="analysis"></p>
<div id="alertBox"></div>
</div>

</div>

<script>

let data = [];
let chart;

// تصنيف
function classify(cvss){
    if(cvss>=9) return "CRITICAL";
    if(cvss>=7) return "HIGH";
    if(cvss>=4) return "MEDIUM";
    return "LOW";
}

// 🤖 AI Engine
function aiEngine(cvss, level){

    let score = cvss * 10;

    if(level==="CRITICAL") score += 50;
    if(level==="HIGH") score += 30;

    if(score > 120){
        return {
            text:"🚨 Critical Threat Detected",
            action:"Immediate isolation + patch system"
        };
    }
    else if(score > 80){
        return {
            text:"⚠️ High Risk Pattern",
            action:"Fix vulnerability urgently"
        };
    }
    else if(score > 40){
        return {
            text:"Moderate Risk",
            action:"Monitor and patch later"
        };
    }
    else{
        return {
            text:"Low Risk",
            action:"No urgent action"
        };
    }
}

// إضافة
function addVuln(){

    let cvss = parseFloat(document.getElementById("cvss").value);

    if(isNaN(cvss) || cvss<0 || cvss>10){
        alert("Enter CVSS 0-10");
        return;
    }

    let level = classify(cvss);
    let ai = aiEngine(cvss, level);

    data.push({
        cvss,
        level,
        aiText: ai.text,
        fix: ai.action,
        time: new Date().toLocaleTimeString()
    });

    update();
}

// 🎭 محاكاة هجوم
function simulateAttack(){

    let attacks = [
        {type:"SQL Injection", cvss:9.8},
        {type:"XSS Attack", cvss:8.2},
        {type:"Brute Force", cvss:7.5},
        {type:"Malware Activity", cvss:9.5},
        {type:"Suspicious Login", cvss:5.2}
    ];

    let attack = attacks[Math.floor(Math.random()*attacks.length)];

    let level = classify(attack.cvss);
    let ai = aiEngine(attack.cvss, level);

    data.push({
        cvss: attack.cvss,
        level: level,
        aiText: attack.type + " → " + ai.text,
        fix: ai.action,
        time: new Date().toLocaleTimeString()
    });

    update();
}

// تحديث
function update(){

    let list = document.getElementById("list");
    let logs = document.getElementById("logs");

    list.innerHTML="";
    logs.innerHTML="";

    let search = document.getElementById("search").value;
    let filter = document.getElementById("filter").value;

    let count = {CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0};
    let criticalFound = false;

    data.forEach(v=>{

        if(filter!=="ALL" && v.level!==filter) return;
        if(!v.cvss.toString().includes(search)) return;

        count[v.level]++;
        if(v.level==="CRITICAL") criticalFound = true;

        let li = document.createElement("li");
        li.innerHTML = `
        <b>[${v.time}] CVSS ${v.cvss}</b><br>
        <span class="badge ${v.level}">${v.level}</span><br>
        🤖 ${v.aiText}<br>
        🔧 ${v.fix}
        `;
        list.appendChild(li);

        let log = document.createElement("li");
        log.innerText = `[${v.time}] ${v.aiText}`;
        logs.appendChild(log);

    });

    draw(count);
    globalAnalysis(count, criticalFound);
}

// تحليل عام + صوت
function globalAnalysis(c, critical){

    let text = "";

    if(critical){
        text = "🚨 ACTIVE ATTACK DETECTED";

        document.getElementById("alertBox").innerHTML =
        '<div class="alert">⚠️ System under attack!</div>';

        let audio = new Audio("https://www.soundjay.com/buttons/beep-01a.mp3");
        audio.play();
    }
    else if(c.HIGH > 2){
        text = "⚠️ Multiple high risks detected";
    }
    else{
        text = "✅ System Stable";
        document.getElementById("alertBox").innerHTML = "";
    }

    document.getElementById("analysis").innerText = text;
}

// رسم
function draw(c){

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"pie",
        data:{
            labels:["Critical","High","Medium","Low"],
            datasets:[{
                data:[c.CRITICAL,c.HIGH,c.MEDIUM,c.LOW],
                backgroundColor:["#dc2626","#f97316","#facc15","#22c55e"]
            }]
        }
    });
}

// حذف
function clearData(){
    data=[];
    update();
}

</script>

</body>
</html>
